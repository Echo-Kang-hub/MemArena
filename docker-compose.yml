version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memarena-backend
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/backend/data
    depends_on:
      - chroma
      - neo4j

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: memarena-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

  chroma:
    image: chromadb/chroma:0.5.5
    container_name: memarena-chroma
    ports:
      - '8001:8000'
    volumes:
      - ./volumes/chroma:/chroma/chroma

  neo4j:
    image: neo4j:5.23
    container_name: memarena-neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=neo4j/memarena
    volumes:
      - ./volumes/neo4j:/data
